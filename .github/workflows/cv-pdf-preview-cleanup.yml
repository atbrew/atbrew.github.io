name: Clean up CV PDF preview on PR close

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

concurrency:
  group: cv-pdf-preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check pr-previews branch exists
        id: branch_check
        run: |
          if git ls-remote --exit-code --heads "https://github.com/${{ github.repository }}.git" pr-previews >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "pr-previews branch does not exist yet — nothing to clean up"
          fi

      - name: Checkout pr-previews branch
        if: steps.branch_check.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: pr-previews

      - name: Remove this PR's preview directory
        if: steps.branch_check.outputs.exists == 'true'
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          if [ ! -d "$PR_DIR" ]; then
            echo "$PR_DIR not found on pr-previews — nothing to clean up"
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git rm -rf "$PR_DIR"
          git commit -m "Remove preview for closed PR #${{ github.event.pull_request.number }}"
          git push origin pr-previews
