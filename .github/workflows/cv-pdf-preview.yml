name: Build CV PDF preview

on:
  pull_request:
    paths:
      - 'docs/cv.markdown'
      - 'docs/assets/css/cv.css'
      - 'src/convert_markdown_to_pdf_in_place.py'
      - '.github/workflows/cv-pdf-preview.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cv-pdf-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf

      - name: Install Python dependencies
        run: pip install markdown2 pdfkit

      - name: Build CV PDF
        run: python ./src/convert_markdown_to_pdf_in_place.py --input ./docs/cv.markdown --css ./docs/assets/css/cv.css

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: docs/cv.pdf
          retention-days: 14

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cv-pdf-preview -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              marker,
              '📄 **CV PDF preview** built for this PR.',
              '',
              `[Download \`cv.pdf\` from this run's artifacts](${runUrl}#artifacts)`,
              '',
              `_Built from \`${sha}\` — artifact retained for 14 days._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
