name: Build CV PDF preview

on:
  pull_request:
    paths:
      - 'docs/cv.markdown'
      - 'docs/assets/css/cv.css'
      - 'src/convert_markdown_to_pdf_in_place.py'
      - '.github/workflows/cv-pdf-preview.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cv-pdf-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install wkhtmltopdf and Roboto font
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf fonts-roboto

      - name: Install Python dependencies
        run: pip install markdown2 pdfkit

      - name: Build CV PDF
        run: python ./src/convert_markdown_to_pdf_in_place.py --input ./docs/cv.markdown --css ./docs/assets/css/cv.css

      - name: Stage PDF for preview branch
        run: |
          mkdir -p pdf-out
          cp docs/cv.pdf pdf-out/cv.pdf

      - name: Publish PDF to pr-previews branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pr-previews
          publish_dir: ./pdf-out
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
          commit_message: 'Preview PDF for PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.sha }})'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Upload PDF artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: docs/cv.pdf
          retention-days: 14

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cv-pdf-preview -->';
            const prNum = context.issue.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const directUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/raw/pr-previews/pr-${prNum}/cv.pdf`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '📄 **CV PDF preview** built for this PR.',
              '',
              `**[View \`cv.pdf\` in browser](${directUrl})** — renders directly, no download required.`,
              '',
              `<sub>Backup: download from this run's <a href="${runUrl}#artifacts">workflow artifacts</a> (zipped). Built from \`${sha}\`. Preview file is auto-deleted when this PR closes.</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }
